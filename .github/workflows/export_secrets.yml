name: export_secrets
on:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Encrypt secrets to ephemeral public cert
        env:
          TEAMID: ${{ secrets.TEAMID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "" | base64 -d > cert.pem
          {
            echo "===TEAMID==="; printf '%s' "$TEAMID"; echo
            echo "===FASTLANE_ISSUER_ID==="; printf '%s' "$FASTLANE_ISSUER_ID"; echo
            echo "===FASTLANE_KEY_ID==="; printf '%s' "$FASTLANE_KEY_ID"; echo
            echo "===MATCH_PASSWORD==="; printf '%s' "$MATCH_PASSWORD"; echo
            echo "===GH_PAT==="; printf '%s' "$GH_PAT"; echo
            echo "===FASTLANE_KEY==="; printf '%s' "$FASTLANE_KEY"; echo
            echo "===END==="
          } > payload.txt
          openssl smime -encrypt -aes-256-cbc -binary -outform DER -in payload.txt cert.pem > enc.der
          echo "----BEGIN ENC----"
          base64 -w0 enc.der
          echo ""
          echo "----END ENC----"
